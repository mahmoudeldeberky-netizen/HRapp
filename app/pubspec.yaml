name: hr_superapp
description: Global multi-country HR Super-App (AR/EN, dark/light, offline-first).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # State management & DI
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Backend
  supabase_flutter: ^2.5.6

  # Offline cache
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3

  # Security & device
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.2.0
  geolocator: ^12.0.0

  # Utilities
  equatable: ^2.0.5
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  generate: true
